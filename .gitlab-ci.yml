image: mcr.microsoft.com/dotnet/sdk:9.0

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/

stages:
  - build
  - test

build:
  stage: build
  script:
    - dotnet restore StranaKart.Assignment
    - dotnet build StranaKart.Assignment --no-restore -c Release

test:
  stage: test
  needs: ["build"]
  script:
    - dotnet test StranaKart.slnx -c Release --no-build