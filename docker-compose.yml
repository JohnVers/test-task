services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dellin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dellin"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=dellin;Username=postgres;Password=postgres"
    volumes:
      - ./StranaKart.Assignment/files:/app/files

volumes:
  postgres_data:
